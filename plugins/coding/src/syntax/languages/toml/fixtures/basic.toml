# Top-level bare keys (should become preamble)
name = "my-project"
version = "0.1.0"

[package]
edition = "2024"
rust-version = "1.93"
description = "A sample project"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
tokio = "1.0"
clap = "4.0"

[dev-dependencies]
rstest = "0.25"
insta = "1.42"

[[bin]]
name = "main"
path = "src/main.rs"

[[bin]]
name = "helper"
path = "src/helper.rs"
